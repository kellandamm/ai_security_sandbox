server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The deployed SPA is built with VITE_API_BASE=https://<apim>/sandbox.
    # Same-origin API paths on the frontend host must not bypass APIM.
    location /api/ {
        default_type application/json;
        return 421 '{"error":"frontend API proxy disabled; use the APIM /sandbox endpoint"}';
    }

    location /sandbox/ {
        default_type application/json;
        return 421 '{"error":"frontend API proxy disabled; use the APIM /sandbox endpoint"}';
    }

    # SPA routing — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.azure-api.net https://login.microsoftonline.com https://*.login.microsoftonline.com; frame-src 'self' https://login.microsoftonline.com; form-action 'self' https://login.microsoftonline.com;";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
