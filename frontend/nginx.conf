server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward same-origin /api requests directly to the orchestrator App Service.
    location /api/ {
        resolver 168.63.129.16 ipv6=off valid=30s;
        set $orchestrator_upstream app-odjretldtozf4-orchestrator.azurewebsites.net;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass https://$orchestrator_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $orchestrator_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Compatibility for older bundles that were built with VITE_API_BASE=/sandbox.
    # This prevents stale browser assets from posting to the SPA/static handler and returning nginx 405.
    location /sandbox/ {
        resolver 168.63.129.16 ipv6=off valid=30s;
        set $orchestrator_upstream app-odjretldtozf4-orchestrator.azurewebsites.net;
        rewrite ^/sandbox/(.*)$ /$1 break;
        proxy_pass https://$orchestrator_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $orchestrator_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Temporary unauthenticated probe path to validate the direct orchestrator proxy.
    location = /proxy-health {
        resolver 168.63.129.16 ipv6=off valid=30s;
        set $orchestrator_upstream app-odjretldtozf4-orchestrator.azurewebsites.net;
        proxy_pass https://$orchestrator_upstream/health;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $orchestrator_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
    }

    # SPA routing — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.azure-api.net https://login.microsoftonline.com https://*.login.microsoftonline.com; frame-src 'self' https://login.microsoftonline.com; form-action 'self' https://login.microsoftonline.com;";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
