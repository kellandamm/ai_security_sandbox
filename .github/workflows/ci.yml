name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Unit Tests ────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check . --select E,W,F,I

      - name: Unit tests
        run: pytest ../tests/unit/ -v --tb=short
        env:
          # Set empty env vars so modules don't fail on import
          WORKSPACE_STORAGE_ACCOUNT: ""
          AUDIT_STORAGE_ACCOUNT: ""
          APP_CONFIG_ENDPOINT: ""
          DCE_ENDPOINT: ""
          DCR_IMMUTABLE_ID: ""
          AZURE_OPENAI_ENDPOINT: ""

  # ── OPA Policy Tests ─────────────────────────────────────────────────────────
  opa-test:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Check OPA policy syntax
        run: |
          opa check policies/agent_actions.rego
          opa check policies/filesystem.rego
          opa check policies/network.rego
          opa check policies/secrets.rego

      - name: Run OPA policy tests
        run: opa test policies/ -v

  # ── Bicep Lint ───────────────────────────────────────────────────────────────
  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep
        run: |
          curl -Lo /usr/local/bin/bicep \
            https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x /usr/local/bin/bicep

      - name: Lint Bicep files
        run: |
          bicep lint infra/main.bicep
          for f in infra/modules/*.bicep; do
            echo "Linting $f..."
            bicep lint "$f"
          done

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: app/
          push: false
          tags: ai-sandbox/orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
